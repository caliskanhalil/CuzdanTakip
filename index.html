<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <title>Bireysel Cüzdan Uygulaması</title>
  </head>
  <body>
    <h1>🧾 Bireysel Cüzdan Uygulaması</h1>
    <div class="moneyInput">
      <div class="gelirInput">
        <input type="text" id="gelirTuru" placeholder="Gelir Türü Girin" />
        <input type="number" id="gelir" placeholder="Gelirinizi Girin" />
        <select name="" id="gelirCategoryList">
          <option value="disabled" disabled selected>Kategori Seçin</option>
          <option value="maas" class="gelirCategoryListItem">Maaş</option>
          <option value="yemek" class="gelirCategoryListItem">Yemek</option>
          <option value="test" class="gelirCategoryListItem">Test</option>
        </select>

        <button id="gelirBtn">Ekle</button>
        <button id="gelirCategoryBtnOpen">Gelir Türü Ekle</button>
      </div>
      <div class="giderInput">
        <input type="text" id="giderTuru" placeholder="Gider Türü Girin" />
        <input type="number" id="gider" placeholder="Giderinizi Girin" />
        <select name="" id="giderCategoryList">
          <option value="" class="giderCategoryListItem">Kategori Seçin</option>
          <option value="" class="giderCategoryListItem">Yemek</option>
          <option value="" class="giderCategoryListItem">sosyal</option>
        </select>

        <button id="giderBtn">Ekle</button>
        <button id="giderCategoryBtnOpen">Gider Türü Ekle</button>
      </div>
    </div>

    <div class="box">
      <h3>📌 Harcamanız İle İlgili Önerileri Anında Alın!</h3>
      <button>Asistandan Öneri Al</button>
    </div>

    <div class="box" id="gelirBox">
      <h3>💸 Gelirler</h3>
      <!-- <div class="expense-item" id="gelirKutusu">
        <span class="gelirType">Yemek</span>
        <span class="gelirPrice">40 ₺</span>
        <span class="gelirCategoryItem">Yemek</span>
      </div> -->
    </div>

    <div class="box" id="giderBox">
      <h3>💸 Giderler</h3>
      <!-- <div class="expense-item" class="giderKutusu">
        <span class="giderType">Yemek</span>
        <span class="giderPrice">40 ₺</span>
      </div> -->
    </div>

    <div class="summary">
      Toplam Gider: <span class="totalHarcama">0</span> ₺ | Toplam Gelir:
      <span class="totalGelir">0</span> ₺
    </div>

    <div class="gelirCategoryModal">
      <div class="container">
        <a href="">X</a>
        <h2>Gelir Türü</h2>
        <input type="text" id="gelirCategory" placeholder="Gelir Türü Girin" />
        <button id="addGelirCategoryBtn">Kaydet</button>
      </div>
    </div>

    <div class="giderCategoryModal">
      <div class="container">
        <a href="">X</a>
        <h2>Gider Türü</h2>
        <input type="text" id="giderCategory" placeholder="Gider Türü Girin" />
        <button id="addGiderCategoryBtn">Kaydet</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
